name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Compute site configuration
        id: site
        shell: bash
        run: |
          owner='${{ github.repository_owner }}'
          repo='${{ github.event.repository.name }}'

          if [ "$repo" = "${owner}.github.io" ]; then
            echo "site_url=https://${owner}.github.io" >> "$GITHUB_OUTPUT"
            echo "site_base=/" >> "$GITHUB_OUTPUT"
          else
            echo "site_url=https://${owner}.github.io" >> "$GITHUB_OUTPUT"
            echo "site_base=/${repo}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          SITE_URL: ${{ steps.site.outputs.site_url }}
          SITE_BASE: ${{ steps.site.outputs.site_base }}
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
